<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Etch-A-Sketch</title>
  </head>
  <body>
    <h1 id="title">Etch-A-Sketch</h1>
    <div id="main">
      <div id="sidebar">
        <p>Cells per side: <input type="number" id="cell-number-input" min="10" max="100" value="16" /></p>
        <button id="toggle-border"><p>𝄜</p></button>
        <input type="color" id="color-choice" class="toggle-btn" data-color="default" />
        <button id="random-color" class="toggle-btn" data-color="random"><p>🌈</p></button>
      </div>
      <div id="container"></div>
      <div id="ghost-spacer"></div>
    </div>
  </body>
</html>
